<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>History - Green Campus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#f5f7fb;
    font-family:'Segoe UI', sans-serif;
}

.container-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    margin-top:40px;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#1b2a49;
}

tr:hover {
    background-color: #f1f5ff;
    cursor: pointer;
}

.active-row {
    background-color: #dbe4ff !important;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Hasil Carbon Footprint</h2>

<div class="container-box">

<h4 class="d-flex align-items-center gap-2">
    <img src="total.png" width="35">
    Total Emisi Karbon
</h4>

<div id="totalBox" style="
background:#eef3ff;
padding:20px;
border-radius:15px;
font-weight:600;
font-size:20px;
margin-bottom:20px;
"></div>

<h5>Grafik Emisi</h5>
<canvas id="historyChart"></canvas>

<h5 class="mt-4">Grafik Total Emisi per Tanggal</h5>
<canvas id="totalChart"></canvas>

<h5 class="mt-4">History Data</h5>
<div id="historyBox"></div>

</div>
</div>

<script>

let historyChart = null;
let globalData = [];
let totalChart = null;

// ======================
// LOAD DATA
// ======================
function loadHistory(){

    fetch('/history')
    .then(res => res.json())
    .then(data => {

        globalData = data;

        let totalAll = 0;

        // 🔥 tambahan buat chart total
        let labels = [];
        let totals = [];

        let html = `
        <table class="table table-bordered">
        <thead>
        <tr>
            <th>Tanggal</th>
            <th>Total Emisi</th>
        </tr>
        </thead>
        <tbody>
        `;

        data.forEach((item, index) => {

            const date = item.created_at 
                ? new Date(item.created_at).toLocaleDateString()
                : "Tidak ada tanggal";

            const total = Number(item.total_emission) || 0;

            totalAll += total;

            // 🔥 masukin ke chart total
            labels.push(date);
            totals.push(total);

            html += `
            <tr onclick="showChart(${index}, this)">
                <td>${date}</td>
                <td>${total} ton</td>
            </tr>
            `;
        });

        html += "</tbody></table>";
        document.getElementById("historyBox").innerHTML = html;

        document.getElementById("totalBox").innerHTML =
            "Total Emisi: <b>" + totalAll.toFixed(2) + " ton CO₂</b>";

        // tampilkan chart pertama
        if(data.length > 0){
            showChart(0);
        }

        // ======================
        // 🔥 CHART TOTAL PER TANGGAL
        // ======================
        if(totalChart){
            totalChart.destroy();
        }

        const ctxTotal = document.getElementById("totalChart").getContext("2d");

        totalChart = new Chart(ctxTotal, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Emisi per Hari',
                    data: totals,
                    backgroundColor: '#4e73df',
                    borderRadius: 10,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                animation: {
                    duration: 1000,
                    easing: 'easeOutQuart'
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

    });
}

// ======================
// SHOW CHART PER DATA
// ======================
function showChart(index, element){

    const item = globalData[index];

    // 🔥 highlight row
    document.querySelectorAll("tr").forEach(tr => tr.classList.remove("active-row"));
    if(element){
        element.classList.add("active-row");
    }

    const listrik = Number(item.electricity_emission) || 0;
    const bus = Number(item.bus_emission) || 0;
    const mobil = Number(item.car_emission) || 0;
    const motor = Number(item.motor_emission) || 0;
    const total = Number(item.total_emission) || 0;

    if(historyChart){
        historyChart.destroy();
    }

    const ctx = document.getElementById("historyChart").getContext("2d");

    historyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Electricity','Bus','Car','Motor','Total'],
            datasets: [{
                label: 'Emission Detail',
                data: [listrik, bus, mobil, motor, total],
                backgroundColor: [
                    '#4e73df',  // biru
                    '#1cc88a',  // hijau
                    '#36b9cc',  // cyan
                    '#f6c23e',  // kuning
                    '#e74a3b'   // merah
                ],
                borderRadius: 10,
                barPercentage: 0.6
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    backgroundColor: '#1b2a49',
                    titleColor: '#fff',
                    bodyColor: '#fff'
                }
            },
            animation: {
                duration: 1000,
                easing: 'easeOutQuart'
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: {
                        color: '#eaeaea'
                    }
                },
                x: {
                    grid: {
                        display: false
                    }
                }
            }
        }
    });

    // update total sesuai yg diklik
    document.getElementById("totalBox").innerHTML =
        "Total Emisi (dipilih): <b>" + total + " ton CO₂</b>";
}

// auto load
loadHistory();

</script>

</body>
</html>
