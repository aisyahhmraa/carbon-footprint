<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Green Campus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: url('/telu.png') center/cover no-repeat;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: 1;
}

.login-container {
    position: relative;
    z-index: 2;
    background: white;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    max-width: 400px;
    width: 100%;
    text-align: center;
}

.login-container h2 {
    font-weight: 700;
    margin-bottom: 25px;
    color: #1b2a49;
}

.form-control {
    border-radius: 10px;
    padding: 12px 15px;
    margin-bottom: 20px;
}

.password-wrapper {
    position: relative;
}

.password-wrapper i {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
}

.btn-login {
    background: #1b2a49;
    color: white;
    border: none;
    padding: 12px 35px;
    border-radius: 50px;
    font-weight: 600;
    width: 100%;
    transition: 0.3s;
}

.btn-login:hover {
    background: #0f1b33;
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="login-container">
    <h2>Login</h2>

    <form method="POST" action="/login">
        <input 
            type="text" 
            class="form-control" 
            name="username" 
            placeholder="Username" 
            required
        >

        <div class="password-wrapper">
            <input 
                type="password" 
                class="form-control" 
                name="password" 
                id="password"
                placeholder="Password" 
                required
            >
            <span id="togglePassword" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer;">
                <i class="bi bi-eye-slash"></i>
            </span>
        </div>

        <button type="submit" class="btn btn-login">
            Login
        </button>
        <p style="margin-top:15px; font-size:14px;">
            Belum punya akun? 
            <a href="/register" style="color:#1b2a49; font-weight:600;">
                Register
            </a>
        </p>
    </form>
</div>

<script>
const togglePassword = document.querySelector("#togglePassword");
const password = document.querySelector("#password");
const icon = togglePassword.querySelector("i");

togglePassword.addEventListener("click", function () {

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        password.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }

});
</script>

</body>
</html>
